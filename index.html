<!DOCTYPE html>
<html lang="de">

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta charset="UTF-8">
  <title>Endfield Rotation Builder</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/settings.css">
</head>

<body>
  <div id="globalTooltip" class="global-tooltip"></div>

  <div id="selectionScreen">
    <h2>Wähle dein Team (max. 4)</h2>

    <div id="teamSlots" class="team-slots"></div>

    <h3>Operator auswählen</h3>
    <div id="operatorList" class="operator-grid"></div>

    <button onclick="confirmTeam()">Team bestätigen</button>
  </div>

  <div id="builderScreen" style="display:none;">
    <h2>Rotation Builder</h2>

    <div class="builder-shell">

      <div class="builder-top">
        <h3>Selected Team</h3>
        <div id="selectedOperators" class="team-top-panel"></div>
      </div>

      <div class="builder-divider"></div>

      <div class="builder-content">

        <aside class="builder-sidebar">
          <h3>Menu</h3>

          <button onclick="backToSelection()">← Back to Team Selection</button>
          <button onclick="exportImage()">📸 Export Rotation</button>
          <button onclick="clearRotation()">🗑️ Clear Rotation</button>
          <button id="openSettingsBtn" type="button">⚙️ Settings</button>
        </aside>

        <main class="builder-main">
          <!--
          <section class="builder-panel">
            <h3>Enemy</h3>
            <div id="enemyBox" class="enemy-panel">
              <img id="enemyImage" src="assets/enemy/enemy.png" alt="Enemy">
            </div>
            <div id="enemyEffects" class="enemy-effects-panel"></div>
          </section>
-->
          <section class="builder-panel">
            <h3>Skills</h3>
            <div id="skillList" class="skills-panel"></div>
          </section>

          <section class="builder-panel">
            <h3>Rotation</h3>
            <div id="rotation" class="rotation-panel">
              <div id="rotationDropZone"></div>
            </div>
          </section>
        </main>

      </div>
    </div>
  </div>

  <div id="settingsModal" class="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <h2 class="settings-title">Settings</h2>
        <button id="closeSettingsBtn" class="settings-close" type="button">×</button>
      </div>

      <div class="settings-section">
        <span class="settings-label">Rotation Skill Size</span>
          <div class="settings-option-row">
          
            <!-- Small -->
            <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="small">
              <div class="settings-option-title">Small</div>
              <div class="settings-preview">
                <div class="settings-preview-box" style="width: 38px; height: 38px;"></div>
              </div>
              <div class="settings-size-label">56px</div>
            </button>
          
            <!-- Medium -->
            <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="medium">
              <div class="settings-option-title">Medium</div>
              <div class="settings-preview">
                <div class="settings-preview-box" style="width: 52px; height: 52px;"></div>
              </div>
              <div class="settings-size-label">72px</div>
            </button>
          
            <!-- Large -->
            <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="large">
              <div class="settings-option-title">Large</div>
              <div class="settings-preview">
                <div class="settings-preview-box" style="width: 66px; height: 66px;"></div>
              </div>
              <div class="settings-size-label">88px</div>
            </button>
          
            <!-- XL -->
            <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="xl">
              <div class="settings-option-title">XL</div>
              <div class="settings-preview">
                <div class="settings-preview-box" style="width: 78px; height: 78px;"></div>
              </div>
              <div class="settings-size-label">104px</div>
            </button>
          
            <!-- XXL -->
            <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="xxl">
              <div class="settings-option-title">XXL</div>
              <div class="settings-preview">
                <div class="settings-preview-box" style="width: 92px; height: 92px;"></div>
              </div>
              <div class="settings-size-label">120px</div>
            </button>
          
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/sortablejs@1.15.0/Sortable.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script src="js/utils/tooltipFormatter.js"></script>

  <script src="js/data/operators/alesh.js"></script>
  <script src="js/data/operators/antal.js"></script>
  <script src="js/data/operators/akekuri.js"></script>
  <script src="js/data/operators/arclight.js"></script>
  <script src="js/data/operators/ardelia.js"></script>
  <script src="js/data/operators/avywenna.js"></script> 
  <script src="js/data/operators/gilberta.js"></script>
  <script src="js/data/operators/laevatain.js"></script>
  <script src="js/data/operators/rossi.js"></script>
  <script src="js/data/operators/perlica.js"></script>
  <script src="js/data/operators/endministrator.js"></script>
  <script src="js/data/operators/zhuang.js"></script>
  <script src="js/data/operators.js"></script>

  <script src="js/state/appState.js"></script>

  <script src="js/logic/operatorStateEngine.js"></script>
  <script src="js/logic/storage.js"></script>
  <script src="js/logic/export.js"></script>
  <script src="js/logic/snakeLayout.js"></script>
  <script src="js/logic/reactionEngine.js"></script>
  <script src="js/logic/comboEngine.js"></script>
  <script src="js/logic/dragDrop.js"></script>
  <script src="js/logic/uiSettings.js"></script>
  <script src="js/logic/tapInput.js"></script>

  <script src="js/ui/enemyPanel.js"></script>
  <script src="js/ui/teamPreview.js"></script>
  <script src="js/ui/skillIconRenderer.js"></script>
  <script src="js/ui/skillsPanel.js"></script>
  <script src="js/ui/operatorBuffs.js"></script>
  <script src="js/ui/rotationGrid.js"></script>
  <script src="js/ui/teamSelection.js"></script>

  <script src="js/main.js"></script>
</body>

</html>
