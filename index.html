<body>
  <link rel="stylesheet" href="css/settings.css?v=3">
  <div id="globalTooltip" class="global-tooltip"></div>

  <div id="selectionScreen">
    <div class="selection-hero">
      <div class="selection-brand">
        <span>TEAM BUILDER FOR</span>
        <strong>Arknights: ENDFIELD</strong>
      </div>

      <button class="selection-confirm-btn" onclick="confirmTeam()">
        <span class="confirm-check">✓</span>
        <span>Confirm team</span>
      </button>
    </div>

    <div class="selection-divider"></div>

    <div class="selection-title-row">
      <h2 class="selection-section-title">Choose your team</h2>
      <span class="selection-max-label">// MAX. 4</span>
    </div>

    <div id="teamSlots" class="team-slots"></div>

    <div class="selection-title-row operator-title-row">
      <h3 class="selection-section-title">Select operator</h3>
    </div>

    <div id="operatorList" class="operator-grid"></div>
  </div>

  <div id="builderScreen" style="display:none;">
    <h2>Rotation Builder</h2>

    <div class="builder-shell">
      <div class="builder-top">
        <h3>Selected Team</h3>
        <div id="selectedOperators" class="team-top-panel"></div>
      </div>

      <div class="builder-divider"></div>

      <div class="builder-content">
        <aside class="builder-sidebar">
          <h3>Menu</h3>
          <button onclick="backToSelection()">← Back to Team Selection</button>
          <button onclick="exportImage()">📸 Export Rotation</button>
          <button onclick="clearRotation()">🗑️ Clear Rotation</button>
          <button id="openSettingsBtn" type="button">⚙️ Settings</button>
        </aside>

        <main class="builder-main">
          <section class="builder-panel">
            <h3>Skills</h3>
            <div id="skillList" class="skills-panel"></div>
          </section>
          <section class="builder-panel">
            <h3>Rotation</h3>
            <div id="rotation" class="rotation-panel">
              <div id="rotationDropZone"></div>
            </div>
          </section>
          <section class="builder-panel">
            <h3>Enemy</h3>
            <button id="selectEnemyBtn" type="button">Select Enemy</button>
            <div id="enemySkillBar" class="skills-panel"></div>
          </section>
        </main>
      </div>
    </div>
  </div>

  <div id="settingsModal" class="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <h2 class="settings-title">Settings</h2>
        <button id="closeSettingsBtn" class="settings-close" type="button">×</button>
      </div>
      <div class="settings-section">
        <span class="settings-label">Rotation Skill Size</span>
        <div class="settings-option-row">
          <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="small"><div class="settings-option-title">Small</div><div class="settings-preview"><div class="settings-preview-box" style="width: 38px; height: 38px;"></div></div><div class="settings-size-label">56px</div></button>
          <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="medium"><div class="settings-option-title">Medium</div><div class="settings-preview"><div class="settings-preview-box" style="width: 52px; height: 52px;"></div></div><div class="settings-size-label">72px</div></button>
          <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="large"><div class="settings-option-title">Large</div><div class="settings-preview"><div class="settings-preview-box" style="width: 66px; height: 66px;"></div></div><div class="settings-size-label">88px</div></button>
          <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="xl"><div class="settings-option-title">XL</div><div class="settings-preview"><div class="settings-preview-box" style="width: 78px; height: 78px;"></div></div><div class="settings-size-label">104px</div></button>
          <button class="settings-option-btn" data-setting="rotationSkillSize" data-value="xxl"><div class="settings-option-title">XXL</div><div class="settings-preview"><div class="settings-preview-box" style="width: 92px; height: 92px;"></div></div><div class="settings-size-label">120px</div></button>
        </div>
      </div>
    </div>
  </div>

  <div id="enemyModal" class="settings-modal">
    <div class="settings-dialog">
      <div class="settings-header">
        <h2 class="settings-title">Select Enemy</h2>
        <button id="closeEnemyModalBtn" class="settings-close" type="button">×</button>
      </div>
      <div id="enemyModalList" class="settings-section"></div>
    </div>
  </div>
