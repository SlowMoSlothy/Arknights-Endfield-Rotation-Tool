name: Build Operator SEO Pages

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Repository laden
        uses: actions/checkout@v4

      - name: Node installieren
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Pakete installieren
        run: npm ci

      - name: Generator testen
        run: npm test

      - name: Operator-Seiten bauen
        run: npm run build:operators
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}

      - name: Änderungen speichern
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "Build operator SEO pages"

      - name: GitHub Pages mit dem neuen Stand bauen
        uses: actions/github-script@v7
        with:
          github-token: ${{ github.token }}
          script: |
            await github.request("POST /repos/{owner}/{repo}/pages/builds", {
              owner: context.repo.owner,
              repo: context.repo.repo
            });
